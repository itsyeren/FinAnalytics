[tool.poetry]
name = "finanalytics"
version = "0.1.0"
description = "NASDAQ Short-Term Stock Classifier"
authors = ["FinAnalytics Team"]

[tool.poetry.dependencies]
python        = "^3.13"
pandas        = "^2.2"
numpy         = "^1.26"
scikit-learn  = "^1.4"
lightgbm      = "^4.3"
xgboost       = "^2.0"
ta            = "^0.11"
streamlit     = "^1.33"
plotly        = "^5.20"
joblib        = "^1.4"
tqdm          = "^4.66"

[tool.poetry.group.dev.dependencies]
ipykernel = "^6.29"
jupyter   = "^1.0"

[build-system]
requires      = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
